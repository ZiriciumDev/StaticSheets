<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Audio to Sheet Music Prototype</title>

  <!-- VexFlow for sheet music rendering -->
  <script src="https://cdn.jsdelivr.net/npm/vexflow@5.0.0/build/cjs/vexflow.js"></script>

  <!-- pitchfinder for pitch analysis -->
  <script src="https://unpkg.com/pitchfinder@2.2.4/dist/pitchfinder.js"></script>

  <style>
    body { font-family: system-ui, sans-serif; margin: 24px; }
    #output { margin-top: 24px; border: 1px solid #ddd; padding: 12px; min-height: 180px; }
    button { margin-left: 8px; }
    .muted { color: #666; font-size: 14px; }
  </style>
</head>
<body>
  <h1>Audio → Sheet Music (Prototype)</h1>
  <p class="muted">Monophonic-first starter: vocals / lead melody / single-note instrument lines.</p>

  <input type="file" id="audioFile" accept="audio/*" />
  <button id="analyzeBtn">Analyze</button>

  <pre id="status"></pre>
  <div id="output"></div>

  <script>
    const statusEl = document.getElementById("status");
    const outputEl = document.getElementById("output");
    const fileInput = document.getElementById("audioFile");
    const analyzeBtn = document.getElementById("analyzeBtn");

    function setStatus(msg) {
      statusEl.textContent = msg;
    }

    function freqToMidi(freq) {
      return Math.round(69 + 12 * Math.log2(freq / 440));
    }

    function midiToVexKey(midi) {
      const names = ["c", "c#", "d", "d#", "e", "f", "f#", "g", "g#", "a", "a#", "b"];
      const name = names[midi % 12];
      const octave = Math.floor(midi / 12) - 1;
      return `${name}/${octave}`;
    }

    function quantizeDuration(beats) {
      // extremely simple duration mapping
      if (beats >= 1.5) return "h";   // half
      if (beats >= 0.75) return "q";  // quarter
      return "8";                     // eighth
    }

    function groupPitchesToNotes(pitchFrames, frameDurationSec, bpm) {
      const notes = [];
      let current = null;

      for (const f of pitchFrames) {
        if (!f || !Number.isFinite(f)) {
          if (current) {
            notes.push(current);
            current = null;
          }
          continue;
        }

        const midi = freqToMidi(f);

        if (!current) {
          current = { midi, frames: 1 };
        } else if (Math.abs(current.midi - midi) <= 1) {
          current.frames += 1;
        } else {
          notes.push(current);
          current = { midi, frames: 1 };
        }
      }

      if (current) notes.push(current);

      return notes.map(n => {
        const durationSec = n.frames * frameDurationSec;
        const beatSec = 60 / bpm;
        const beats = durationSec / beatSec;
        return {
          midi: n.midi,
          vexKey: midiToVexKey(n.midi),
          duration: quantizeDuration(beats)
        };
      });
    }

    function renderScore(noteEvents) {
      outputEl.innerHTML = "";

      const VF = VexFlow;
      const factory = new VF.Factory({
        renderer: { elementId: "output", width: 900, height: 220 }
      });

      const system = factory.System({ x: 10, y: 40, width: 820 });

      const staveNotes = noteEvents.slice(0, 8).map(n =>
        factory.StaveNote({
          keys: [n.vexKey],
          duration: n.duration
        })
      );

      system
        .addStave({ voices: [factory.Voice().addTickables(staveNotes)] })
        .addClef("treble")
        .addTimeSignature("4/4");

      factory.draw();
    }

    async function decodeFileToAudioBuffer(file) {
      const arrayBuffer = await file.arrayBuffer();
      const ctx = new AudioContext();
      const audioBuffer = await ctx.decodeAudioData(arrayBuffer);
      return { ctx, audioBuffer };
    }

    async function analyzeAudio(file) {
      setStatus("Decoding audio...");
      const { ctx, audioBuffer } = await decodeFileToAudioBuffer(file);

      const channel = audioBuffer.getChannelData(0);
      const sampleRate = audioBuffer.sampleRate;

      setStatus("Loading aubio...");
      const aubioModule = await aubio();
      const { Pitch, Tempo } = aubioModule;

      const bufferSize = 2048;
      const hopSize = 512;

      const pitchDetector = new Pitch("yin", bufferSize, hopSize, sampleRate);
      const tempoDetector = new Tempo(bufferSize, hopSize, sampleRate);

      const pitchFrames = [];
      for (let i = 0; i + hopSize < channel.length; i += hopSize) {
        const frame = channel.slice(i, i + hopSize);
        const freq = pitchDetector.do(frame);
        tempoDetector.do(frame);
        pitchFrames.push(freq > 40 && freq < 2000 ? freq : null);
      }

      let bpm = tempoDetector.getBpm();
      if (!bpm || !Number.isFinite(bpm)) bpm = 120;

      const frameDurationSec = hopSize / sampleRate;
      const noteEvents = groupPitchesToNotes(pitchFrames, frameDurationSec, bpm);

      setStatus(`Done.\nEstimated BPM: ${Math.round(bpm)}\nDetected note events: ${noteEvents.length}`);
      renderScore(noteEvents);
    }

    analyzeBtn.addEventListener("click", async () => {
      const file = fileInput.files?.[0];
      if (!file) {
        setStatus("Choose an audio file first.");
        return;
      }

      try {
        await analyzeAudio(file);
      } catch (err) {
        console.error(err);
        setStatus("Analysis failed. See console for details.");
      }
    });
  </script>
</body>
</html>
